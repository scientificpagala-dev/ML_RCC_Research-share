# BNBC 2020 Seismic Parameters Configuration
# Bangladesh National Building Code - Seismic Design Provisions
# Reference: BNBC 2020, Section 3.2 - Seismic Hazard Analysis

seismic_zones:
  zone_1:
    zone_name: "Zone I"
    pga: 0.05  # Peak Ground Acceleration (g)
    z_coeff: 0.12  # Seismic Zone Coefficient (Z)
    description: "Very low hazard"
    regions: ["Small northern areas"]
    
  zone_2:
    zone_name: "Zone II"
    pga: 0.10
    z_coeff: 0.18
    description: "Low hazard"
    regions: ["Most of Bangladesh"]
    
  zone_3:
    zone_name: "Zone III"
    pga: 0.15
    z_coeff: 0.24
    description: "Moderate hazard"
    regions: ["Dhaka region", "Central Bangladesh"]
    
  zone_4:
    zone_name: "Zone IV"
    pga: 0.20
    z_coeff: 0.36
    description: "High hazard"
    regions: ["Chittagong", "Southeast Bangladesh"]

# Site Classification (BNBC 2020 Section 3.2)
# Based on average shear wave velocity (VS30) in upper 30m
site_classes:
  A:
    name: "Hard Rock"
    vs30_min: 1500  # Shear wave velocity (m/s)
    vs30_max: null
    fa: 0.8  # Amplification factor
    fv: 0.8
    
  B:
    name: "Rock"
    vs30_min: 760
    vs30_max: 1500
    fa: 1.0
    fv: 1.0
    
  C:
    name: "Very Dense Soil & Soft Rock"
    vs30_min: 360
    vs30_max: 760
    fa: 1.2
    fv: 1.2
    
  D:
    name: "Stiff Soil"
    vs30_min: 180
    vs30_max: 360
    fa: 1.6
    fv: 1.4
    
  E:
    name: "Soft Soil"
    vs30_min: 0
    vs30_max: 180
    fa: 2.5
    fv: 1.7

# Building Code Parameters (BNBC 2020)
building_parameters:
  # Importance Factors
  importance_factors:
    I: 1.0  # Ordinary structures
    II: 1.0  # Standard structures
    III: 1.25  # Special facilities, hospitals, schools
    IV: 1.5  # Critical infrastructure
  
  # Response Modification Factors (R) for RC Special Moment Resisting Frames
  response_modification:
    smrf_low_rise: 8.0  # 1-3 stories
    smrf_mid_rise: 8.5  # 4-7 stories
    smrf_high_rise: 8.0  # 8+ stories
  
  # Deflection Amplification Factors
  displacement_amplification:
    smrf: 5.5
  
  # Overstrength Factors (Ω)
  overstrength_factor: 3.0

# Damping Parameters
damping:
  default_ratio: 0.05  # 5% critical damping for RC structures
  # Modal damping can be adjusted using Rayleigh damping:
  # C = a*M + b*K where a and b are calibrated below
  rayleigh_damping:
    a_coefficient: 0.0  # Mass-proportional coefficient
    b_coefficient: 0.0  # Stiffness-proportional coefficient

# Design Response Spectrum Parameters (BNBC 2020)
response_spectrum:
  # Period ranges and acceleration coefficients
  # Sa(T) = Z * I * Ca * S / (Rw)
  periods:
    - T: 0.0
      Ca: 0.40
    - T: 0.5
      Ca: 0.40
    - T: 1.0
      Ca: 0.30
    - T: 2.0
      Ca: 0.20
    - T: 4.0
      Ca: 0.10
  
  # Soil-structure interaction (upper period limit)
  upper_period_limit_factor: 1.25  # For tall flexible structures
  
  # Vertical seismic coefficient (typical RC buildings)
  vertical_coefficient: 0.50  # 50% of horizontal
  
  # Long-period transition period (seconds)
  long_period_transition: 16.0

# Code Factors for RC Moment Resisting Frames
rc_smrf_design:
  # Strength reduction factors (φ)
  strength_reduction:
    flexure: 0.90
    shear: 0.85
    compression: 0.70
    compression_spiral: 0.75
  
  # Minimum concrete strength
  fc_min_mpa: 25.0  # MPa (typical for medium-rise)
  
  # Minimum steel reinforcement ratio  
  rho_min: 0.01  # 1% for flexural members
  
  # Maximum steel reinforcement ratio
  rho_max: 0.06  # 6% per code
  
  # Confinement requirements (SMRF)
  confinement:
    spacing_max: 10.0  # db (rebar diameter) spacing for hoops
    transverse_reinforcement_min: 0.12  # fc'/fy volume ratio

# ============================================================================
# PLASTIC HINGE PROPERTIES (FEMA 356 / ASCE 41-23)
# ============================================================================

plastic_hinge:
  # Moment-Rotation Relationships for RC SMRF
  beam:
    # Linearly tapered I-section properties (typical)
    moment_capacity_multiplier: 1.0  # Actual/nominal capacity
    
    # Performance Level chord rotations (radians)
    acceptance_criteria:
      immediate_occupancy: 0.005  # 0.5%
      life_safety: 0.020  # 2.0%
      collapse_prevention: 0.030  # 3.0%
    
    # Moment-rotation modeling
    post_yield_ratio: 0.03  # Hardening = 3% of initial stiffness
    pinching_factor: 0.70  # Strength degradation factor
    
    # Cumulative damage
    energy_factor: 0.50  # For Park-Ang damage index
  
  column:
    moment_capacity_multiplier: 1.0
    
    acceptance_criteria:
      immediate_occupancy: 0.003  # 0.3%
      life_safety: 0.010  # 1.0%
      collapse_prevention: 0.015  # 1.5%
    
    post_yield_ratio: 0.03
    pinching_factor: 0.70
    energy_factor: 0.50
  
  # Shear Hinge Properties (if applicable)
  shear_hinge:
    enabled: true
    acceptance_criteria:
      immediate_occupancy: 0.004
      life_safety: 0.006
      collapse_prevention: 0.008
    post_yield_ratio: 0.10  # More hardening for shear

# ============================================================================
# PERFORMANCE LEVELS (FEMA P-58)
# ============================================================================

performance_levels:
  # Structural Performance (building-level)
  structural:
    # Operational (Fully operational, minor damage)
    operational:
      pidr_max: 0.005  # 0.5% maximum inter-story drift
      acceleration_damage: false
      description: "Building functional with no structural damage"
    
    # Immediate Occupancy (Life safety protected, minor damage)
    immediate_occupancy:
      pidr_max: 0.010  # 1.0% maximum inter-story drift
      description: "Safe to occupy with minor repairs"
    
    # Life Safety (Severe damage, life safety protected)
    life_safety:
      pidr_max: 0.025  # 2.5% maximum inter-story drift
      description: "Severe damage but collapse prevented"
    
    # Collapse Prevention (Near-collapse, life safety uncertain)
    collapse_prevention:
      pidr_max: 0.040  # 4.0% maximum inter-story drift
      description: "Building near collapse"
  
  # Nonstructural Performance
  nonstructural:
    # Acceleration-sensitive components
    acceleration_threshold: 0.50  # g (50% of gravity)
    
    # Drift-sensitive components
    drift_threshold: 0.015  # 1.5%

# ============================================================================
# FRAMEWORK-SPECIFIC PARAMETERS
# ============================================================================

# Non-Sway Frame Parameters (R=1.5, minimal detailing)
nonsway_parameters:
  response_modification_factor: 1.5
  overstrength_factor: 2.0
  deflection_amplification: 1.0  # No amplification for non-sway
  p_delta_effects: false  # Disable geometric nonlinearity
  
  detailing:
    column_confinement: "none"
    beam_column_joint_reinforcement: "none"
    transverse_reinforcement_spacing: 450.0  # mm max
    longitudinal_reinforcement_ratio: 0.01  # minimum 1%
    
  design_factors:
    base_shear_calculation: "V = Sa × W"  # No R factor reduction
    story_drift_limit: 0.025  # 2.5% (more restrictive than sway frames)

# Ordinary Moment Resisting Frame Parameters (R=3)
omrf_parameters:
  response_modification_factor: 3.0
  overstrength_factor: 2.5
  deflection_amplification: 3.0
  p_delta_effects: true
  
  detailing:
    column_confinement: "light"  # Light transverse reinforcement
    beam_column_joint_reinforcement: "minimal"
    transverse_reinforcement_spacing: 300.0  # mm max
    longitudinal_reinforcement_ratio: 0.015  # 1.5% minimum
    
  design_factors:
    base_shear_calculation: "V = (Sa/R) × W"
    story_drift_limit: 0.020  # 2.0%

# Intermediate Moment Resisting Frame Parameters (R=4)
imrf_parameters:
  response_modification_factor: 4.0
  overstrength_factor: 2.5
  deflection_amplification: 4.0
  p_delta_effects: true
  
  detailing:
    column_confinement: "moderate"
    beam_column_joint_reinforcement: "partial"
    transverse_reinforcement_spacing: 200.0  # mm max
    longitudinal_reinforcement_ratio: 0.020  # 2.0% minimum
    
  design_factors:
    base_shear_calculation: "V = (Sa/R) × W"
    story_drift_limit: 0.015  # 1.5%

# Special Moment Resisting Frame Parameters (R=5)
smrf_parameters:
  response_modification_factor: 5.0
  overstrength_factor: 3.0
  deflection_amplification: 5.5
  p_delta_effects: true
  
  detailing:
    column_confinement: "heavy"  # Mander confinement model
    beam_column_joint_reinforcement: "full_double_layers"
    transverse_reinforcement_spacing: 150.0  # mm max
    longitudinal_reinforcement_ratio: 0.025  # 2.5% minimum
    
  design_factors:
    base_shear_calculation: "V = (Sa/R) × W"
    story_drift_limit: 0.010  # 1.0%

# ============================================================================
# FRAMEWORK COMPARISON METRICS
# ============================================================================

framework_comparison_metrics:
  # Framework Complexity Index (FCI) calculation
  complexity_index:
    base_framework: "nonsway"  # Reference for complexity calculations
    
    # Weight factors for complexity components
    weights:
      reinforcement_volume: 0.40
      fabrication_hours: 0.35
      material_cost: 0.15
      inspection_requirements: 0.10
    
    # Complexity multipliers relative to Non-Sway
    multipliers:
      nonsway: 1.0
      omrf: 1.3
      imrf: 1.8
      smrf: 2.5
  
  # Performance Gradient calculation
  performance_gradient:
    reference_framework: "nonsway"
    metric: "pidr_improvement_percent"
    
  # Cost-Benefit Ratio thresholds
  cost_benefit_thresholds:
    excellent: 2.0  # CBR > 2.0: Strong justification
    good: 1.5       # CBR > 1.5: Good justification
    marginal: 1.0   # CBR > 1.0: Marginal justification
    poor: 0.8       # CBR < 0.8: Poor justification

acceptance_criteria:
  # Flexural Acceptance Criteria for RC Moment Frames
  flexural:
    # Beams
    beam_chord_rotation_io: 0.010  # Immediate Occupancy
    beam_chord_rotation_ls: 0.020  # Life Safety
    beam_chord_rotation_cp: 0.030  # Collapse Prevention
    
    # Columns (without axial load)
    column_chord_rotation_io: 0.005
    column_chord_rotation_ls: 0.015
    column_chord_rotation_cp: 0.025
    
    # Columns (with high axial load P/Pcol > 0.5)
    column_high_axial_io: 0.002
    column_high_axial_ls: 0.008
    column_high_axial_cp: 0.015
  
  # Shear Acceptance Criteria
  shear:
    element_shear_io: 0.004
    element_shear_ls: 0.006
    element_shear_cp: 0.008
  
  # Joint Shear Acceptance Criteria
  joint:
    beam_column_joint_io: 0.015  # rad
    beam_column_joint_ls: 0.025
    beam_column_joint_cp: 0.035

# Default Material Properties (if not specified in model input)
default_materials:
  concrete:
    fc_prime: 28.0  # Compressive strength (MPa) - typical for Bangladesh
    weight_density: 2400.0  # kg/m³
    poisson_ratio: 0.20
    modulus_elasticity: 25000.0  # MPa (computed as 3920*sqrt(fc) per ACI)
  
  steel_rebar:
    yield_strength: 420.0  # MPa (Type 2 steel, common in Bangladesh)
    elastic_modulus: 200000.0  # MPa
    poisson_ratio: 0.30
    density: 7850.0  # kg/m³

# Analysis Defaults (override with analysis_config.yaml if needed)
gravity_loads:
  # Self weight factors
  dead_load_factor: 1.0  # 100% of self-weight
  
  # Live load factors for different occupancy types
  live_load_residential: 40.0  # kN/m² (typical)
  live_load_office: 50.0  # kN/m²
  live_load_school: 50.0  # kN/m²
  
  # Reference floor height
  floor_height_default: 3.5  # meters (typical for RC buildings)

# Document metadata
metadata:
  version: "1.0"
  standard: "BNBC 2020"
  last_updated: "2024-03-27"
  author: "ML Research Team"
  source: "Bangladesh National Building Code 2020"
