# IDA and ML Training Analysis Configuration
# Configuration for structural analysis, IDA pipeline, and ML training
# Last Updated: 2024-03-27

# ============================================================================
# INCREMENTAL DYNAMIC ANALYSIS (IDA) CONFIGURATION
# ============================================================================

ida:
  # Intensity Measure (IM) - Spectral acceleration at target period
  intensity_measure:
    type: "Sa"  # Spectral Acceleration
    period: 0.5  # seconds (representative for RC SMRF)
    damping: 0.05  # 5% critical damping
  
  # Intensity Range
  intensity_range:
    min: 0.05  # g (minimum)
    max: 1.50  # g (maximum)
    initial_step: 0.10  # g
    adaptive: false  # Use adaptive stepping if true
  
  # Analysis Time Parameters
  analysis:
    time_step: 0.005  # seconds
    end_time: 20.0  # seconds (duration after earthquake)
    record_start: 0.0  # Start time in ground motion record
    
  # Convergence & Solver Parameters
  convergence:
    tolerance: 1.0e-8  # Newton-Raphson convergence tolerance
    max_iterations: 25  # Max iterations per time step
    algorithm: "Newton"  # Newton or ModifiedNewton
    test_type: "NormDispIncr"  # Convergence test type
  
  # Recording Parameters
  recorders:
    node_drifts: true  # Record story drift ratios
    base_reactions: true  # Record base shear and moment
    element_stresses: true  # Record element forces
    recording_interval: 10  # Record every N time steps
  
  # Ground Motion Processing
  ground_motion:
    scaling_method: "IM-based"  # Scale to target Sa
    damping_correction: true  # Apply damping correction to Sa
    # Clipping options
    clip_negative_time: true  # Remove pre-event motion
    pad_post_event: 5.0  # Seconds to pad after motion stops

# ============================================================================
# RESPONSE SPECTRUM ANALYSIS (RSA) CONFIGURATION
# ============================================================================

response_spectrum_analysis:
  enabled: true
  
  # Modal Analysis (Eigenvalue Extraction)
  modal_analysis:
    n_modes: 20  # Number of modes to extract
    method: "Shift-and-Invert"  # Eigenvalue extraction method
    tolerance: 1.0e-8  # Convergence tolerance
    shift_parameter: 0.0  # For shift-and-invert
  
  # Response Spectrum Parameters
  spectrum:
    type: "BNBC 2020"  # Spectrum type (BNBC 2020, ASCE 7-22, Custom)
    damping_ratio: 0.05  # 5% critical damping
    site_class: "D"  # A, B, C, D, E (default from BNBC config)
  
  # Modal Response Combination
  modal_combination:
    method: "CQC"  # Complete Quadratic Combination or SRSS
    # CQC parameters
    rho_formula: "standard"  # standard or modified
  
  # Force Distribution
  force_distribution:
    method: "mass_proportional"  # mass_proportional or first_mode
    include_accidental_torsion: true
    torsion_uncertainty: 0.05  # 5% of building width
  
  # Output Options
  output:
    save_eigenvalues: true
    save_mode_shapes: true
    save_modal_forces: true
    save_story_forces: true

# ============================================================================
# TIME HISTORY ANALYSIS (THA) CONFIGURATION
# ============================================================================

time_history_analysis:
  enabled: true
  
  # Dynamic Integration Scheme
  integration:
    method: "Newmark"  # Newmark, HHT (alpha method), etc.
    # Newmark parameters
    gamma: 0.5
    beta: 0.25
    use_rayleigh_damping: true
    # Rayleigh Damping (C = a*M + b*K)
    rayleigh_a: 0.0  # Mass-proportional coefficient
    rayleigh_b: 0.0  # Stiffness-proportional coefficient
  
  # Time Integration Parameters
  time_integration:
    dt: 0.005  # Time step (seconds)
    duration: 30.0  # Total analysis duration (seconds)
    record_start: 0.0  # When to start recording (after P-wave)
    record_interval: 2  # Save every N steps
  
  # Ground Motion Scaling
  scaling:
    method: "Sa-based"  # Sa-based or PGA-based
    target_period: 0.5  # Period for Sa scaling
    intensity_measure: "Sa"  # Sa or PGA
    scale_factors: [0.5, 1.0, 1.5, 2.0]  # Multiple striping
  
  # Nonlinear Analysis
  nonlinear:
    algorithm: "Newton"
    convergence_test: "NormDispIncr"
    tolerance: 1.0e-8
    max_iterations: 25
  
  # Peak Response Extraction
  response_tracking:
    track_nodal_displacement: true
    track_story_drift: true
    track_base_reactions: true
    track_element_forces: true
    track_element_deformations: true
    track_plastic_hinge_rotation: true
  
  # Output Options
  output:
    save_time_history: true
    save_peak_responses: true
    save_hysteresis_loops: true

# ============================================================================
# PUSHOVER ANALYSIS CONFIGURATION
# ============================================================================

pushover_analysis:
  enabled: true
  
  # Load Pattern Definition
  load_pattern:
    type: "proportional"  # uniform, first_mode_proportional, adaptive
    direction: "horizontal"  # Direction of pushover
    apply_gravity_first: true  # Apply gravity before pushover
  
  # Pushover Control Parameters
  control:
    control_node_dof: 3  # DOF to control (3 = horizontal at roof)
    target_displacement: 0.05  # Target roof displacement (fraction of height)
    displacement_increment: 0.001  # Increment per step
    max_steps: 1000  # Maximum number of analysis steps
  
  # Analysis Options
  analysis:
    include_pdelta: true  # Include P-Delta effects
    include_gravity: true  # Include gravity loads
    softening_detection: true  # Detect softening (post-peak)
    failure_criterion: "residual_capacity"  # When to stop
    residual_capacity_percent: 0.20  # 20% of peak capacity
  
  # Solver Parameters
  solver:
    algorithm: "Newton"
    convergence_test: "NormDispIncr"
    tolerance: 1.0e-6
    max_iterations: 100
  
  # Performance Point Identification
  performance_point:
    method: "eigenvalue_damping"  # eigenvalue_damping or direct_displacement
    target_damping: 0.05  # Target damping ratio
  
  # Output Options
  output:
    save_pushover_curve: true
    save_element_forces: true
    save_element_deformations: true
    save_performance_point: true

# ============================================================================
# P-DELTA (GEOMETRIC NONLINEARITY) CONFIGURATION
# ============================================================================

pdelta_analysis:
  enabled: true
  
  # P-Delta Options
  pdelta:
    include_pdelta: true
    transformation: "Corotational"  # Corotational or large_displacement
    consider_initial_imperfections: false
  
  # Stability Index (theta)
  stability_index:
    compute_theta: true
    theta_max_allowed: 0.10  # BNBC 2020: max 0.10 or 0.25 depending on code
    check_per_story: true
    warn_threshold: 0.05  # Issue warning if theta > 5%
  
  # Geometric Stiffness Update
  geometric_stiffness:
    update_method: "iterative"  # Iterative or direct
    update_frequency: "every_step"  # every_step or adaptive
  
  # Stability Verification
  stability:
    check_instability: true
    bifurcation_tolerance: 1.0e-6
    stop_on_instability: true
  
  # Output
  output:
    save_stability_indices: true
    save_geometric_stiffness: true
    report_instability_warnings: true

# ============================================================================
# PLASTIC HINGE ANALYSIS CONFIGURATION
# ============================================================================

plastic_hinge_analysis:
  enabled: true
  
  # Hinge Properties
  hinge_modeling:
    model_type: "moment_curvature"  # moment_curvature, energy-based, or strength-deformation
    hinge_location: "beam_ends"  # beam_ends, column_ends, or both
    # Rotational stiffness parameters
    initial_stiffness_degradation: true
    post_yield_stiffness_ratio: 0.03  # 3% hardening
  
  # Performance Levels (FEMA P-58 / ASCE 41)
  performance_levels:
    # Immediate Occupancy (IO)
    IO:
      chord_rotation_limit: 0.005  # 0.5% rad
      description: "Structure continues to support all loads"
    # Life Safety (LS)
    LS:
      chord_rotation_limit: 0.015  # 1.5% rad
      description: "Some damage but life safety preserved"
    # Collapse Prevention (CP)
    CP:
      chord_rotation_limit: 0.025  # 2.5% rad
      description: "Significant damage, near collapse"
  
  # Hinge Rotation Tracking
  rotation_tracking:
    track_plastic_rotation: true
    track_cumulative_rotation: true
    track_damage_index: true
    damage_index_method: "modified_Park_Ang"  # Park-Ang or Krawinkler
  
  # Acceptance Criteria
  acceptance_criteria:
    # Column acceptance (ASCE 41-23)
    column_flexure_io: 0.005
    column_flexure_ls: 0.015
    column_flexure_cp: 0.025
    
    # Beam acceptance (ASCE 41-23)
    beam_flexure_io: 0.01
    beam_flexure_ls: 0.02
    beam_flexure_cp: 0.03
    
    # Shear acceptance
    shear_io: 0.004
    shear_ls: 0.006
    shear_cp: 0.008
  
  # Dynamic Damage Assessment
  damage_assessment:
    compute_damage_index: true
    compute_performance_state: true
    cumulative_damage_tracking: true
  
  # Output Options
  output:
    save_hinge_rotations: true
    save_damage_states: true
    save_fragility_input: true
    save_hinge_status: true

# ============================================================================
# COMBINED ANALYSIS METHODS CONFIGURATION
# ============================================================================

combined_analysis:
  enabled: true
  
  # Capacity Spectrum Method (RSA + Pushover)
  capacity_spectrum_method:
    enabled: true
    # Spectral displacement method
    method: "ADRS"  # ADRS = Acceleration-Displacement Response Spectrum
  
  # Multi-Stripe Analysis (for Phase 2 IDA data generation)
  multi_stripe:
    enabled: true
    # Intensity levels for each ground motion
    intensity_levels: [0.05, 0.10, 0.15, 0.20, 0.25, 0.30, 0.40, 0.50, 0.60, 0.70, 0.80, 0.90, 1.00, 1.20, 1.50]
    # Intensity measure
    intensity_measure: "Sa"
    reference_period: 0.5
  
  # Analysis Ensemble
  ensemble:
    parallel_processing: true
    n_processors: -1  # -1 = use all available cores
    batch_size: 10  # Process 10 analyses per batch
  
  # Uncertainty Quantification
  uncertainty:
    record_uncertainty: true  # Aleatory uncertainty from GM variability
    model_uncertainty: false  # Epistemic uncertainty from modeling assumptions
    sample_size: 100  # Number of realizations
  
  # Output Options
  output:
    compare_methods: true  # Compare RSA vs THA vs Pushover
    validation_checks: true  # Cross-method validation
    combined_results_db: true  # Save all results to database

# ============================================================================
# FRAMEWORK ANALYSIS CONFIGURATION
# ============================================================================

framework_analysis:
  enabled: true
  
  # Framework Types to Analyze
  frameworks:
    - "nonsway"
    - "omrf"
    - "imrf"
    - "smrf"
  
  # Analysis Parameters per Framework
  framework_specific:
    nonsway:
      p_delta_enabled: false
      damping_ratio: 0.05
      convergence_tolerance: 1.0e-6  # Less strict for non-sway
      max_iterations: 20
    
    omrf:
      p_delta_enabled: true
      damping_ratio: 0.05
      convergence_tolerance: 1.0e-8
      max_iterations: 25
    
    imrf:
      p_delta_enabled: true
      damping_ratio: 0.05
      convergence_tolerance: 1.0e-8
      max_iterations: 25
    
    smrf:
      p_delta_enabled: true
      damping_ratio: 0.05
      convergence_tolerance: 1.0e-8
      max_iterations: 25
  
  # Comparative Analysis Settings
  comparison:
    reference_framework: "nonsway"
    metrics_to_compare:
      - "pidr_median"
      - "pidr_dispersion"
      - "collapse_capacity"
      - "fragility_curves"
    
    statistical_tests:
      anova_enabled: true
      pairwise_t_tests: true
      significance_level: 0.05
  
  # Parallel Processing for Multiple Frameworks
  parallel_processing:
    enabled: true
    max_concurrent_frameworks: 2  # Process 2 frameworks simultaneously
    framework_batch_size: 5  # Process 5 buildings per framework batch
  
  # Output Organization
  output:
    separate_directories: true  # Create framework-specific output dirs
    comparative_summary: true  # Generate cross-framework comparison tables
    framework_prefix: true  # Prefix files with framework name

# ============================================================================
# MACHINE LEARNING TRAINING CONFIGURATION
# ============================================================================

machine_learning:
  # Data Splitting
  data_split:
    train_ratio: 0.80  # 80% training data
    validation_ratio: 0.15  # Of training set → 70% train, 15% validation
    test_ratio: 0.20  # 20% testing data (held out)
    random_state: 42  # Reproducibility seed
  
  # Feature Normalization
  preprocessing:
    scaler_type: "StandardScaler"  # StandardScaler or MinMaxScaler
    fit_on: "train"  # Fit normalization on training data only
    outlier_removal: false
    outlier_threshold: 5.0  # Std deviations
  
  # Cross-Validation
  cross_validation:
    enabled: true
    n_splits: 5  # 5-fold CV
    stratified: false  # For regression, use regular KFold
  
  # Models to Train
  models:
    linear_regression:
      enabled: true
      hyperparameters:
        fit_intercept: true
        normalize: false
    
    random_forest:
      enabled: true
      hyperparameters:
        n_estimators: 200
        max_depth: 20
        min_samples_split: 5
        min_samples_leaf: 2
        random_state: 42
        n_jobs: -1  # Use all cores
        bootstrap: true
        oob_score: true  # Out-of-bag scoring
    
    xgboost:
      enabled: true
      hyperparameters:
        objective: "reg:squarederror"
        n_estimators: 200
        learning_rate: 0.1
        max_depth: 6
        min_child_weight: 1
        subsample: 0.8
        colsample_bytree: 0.8
        random_state: 42
        n_jobs: -1
    
    neural_network:
      enabled: true
      hyperparameters:
        input_features: "auto"  # Determined from data
        hidden_layers: [128, 64, 32]  # Neurons per layer
        activation: "relu"
        output_activation: "linear"  # Regression
        batch_size: 32
        epochs: 100
        validation_split: 0.2
        early_stopping: true
        patience: 10  # Epochs to wait before stopping
        optimizer: "adam"
        learning_rate: 0.001
        loss: "mse"
        metrics: ["mae", "mse"]
        dropout_rate: 0.2
        l2_regularization: 0.001

  # Hyperparameter Optimization (Optuna)
  hyperparameter_tuning:
    enabled: false
    method: "Optuna"  # Or GridSearch, RandomSearch
    n_trials: 50
    sampler: "TPE"  # Tree-structured Parzen Estimator
    pruner: "MedianPruner"
    timeout: 3600  # seconds
    n_jobs: 1

  # Model Evaluation Metrics
  evaluation_metrics:
    regression:
      - "r2"
      - "rmse"
      - "mae"
      - "mape"
  
  # SHAP Analysis for Interpretability
  shap_analysis:
    enabled: true
    methods:
      - "TreeExplainer"  # Fast for tree-based models
      - "KernelExplainer"  # Slower but model-agnostic
    n_samples: 100  # Samples for Kernel explainer
    max_display_features: 20

# ============================================================================
# FILE PATHS & DIRECTORIES
# ============================================================================

paths:
  # Base directories (relative to project root)
  data_dir: "data"
  raw_data_dir: "data/raw"
  processed_data_dir: "data/processed"
  metadata_dir: "data/metadata"
  
  model_dir: "models"
  openseespy_models_dir: "models/openseespy"
  ml_models_dir: "models/ml_models"
  checkpoints_dir: "models/checkpoints"
  
  results_dir: "results"
  figures_dir: "results/figures"
  reports_dir: "results/reports"
  tables_dir: "results/tables"
  
  config_dir: "config"
  
  # Configuration files
  bnbc_config: "config/bnbc_parameters.yaml"
  
  # Output file naming conventions
  processed_data_file: "training_data_combined.csv"
  model_results_file: "model_results.json"
  shap_output_prefix: "shap_analysis"

# ============================================================================
# EXPERIMENT TRACKING (MLflow)
# ============================================================================

mlflow:
  enabled: false  # Enable if using MLflow
  tracking_uri: "http://localhost:5000"
  experiment_name: "seismic-drift-ml-models"
  
  # Artifacts to log
  log_artifacts:
    - "models"
    - "figures"
    - "results"
  
  # Parameters to log
  log_params:
    - "train_ratio"
    - "n_estimators"
    - "max_depth"
    - "learning_rate"

# ============================================================================
# LOGGING & OUTPUT
# ============================================================================

logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "analysis.log"
  
output:
  verbose: true  # Print progress to console
  save_figures: true
  figure_format: "png"  # png, pdf, eps
  figure_dpi: 300
  
  save_tables: true
  table_format: "csv"  # csv, xlsx, json

# ============================================================================
# VALIDATION & VERIFICATION
# ============================================================================

validation:
  # Model performance thresholds
  min_r2_train: 0.85
  min_r2_test: 0.80
  
  # Residual analysis
  check_normality: true  # Shapiro-Wilk test
  check_homoscedasticity: true  # Breusch-Pagan test
  
  # Cross-validation score threshold
  min_cv_score: 0.80

# ============================================================================
# COMPUTATION RESOURCES
# ============================================================================

computation:
  use_gpu: false  # Enable GPU for TensorFlow if available
  gpu_memory_fraction: 0.8  # Fraction of GPU memory to use
  n_jobs: -1  # -1 = use all cores, 1 = single core
  batch_processing: true
  batch_size: 100  # For large datasets

# ============================================================================
# RANDOM SEEDS (Reproducibility)
# ============================================================================

random_state:
  numpy: 42
  tensorflow: 42
  sklearn: 42
  pandas: 42
  seed: 42  # Master seed for all operations

# Document metadata
metadata:
  version: "1.0"
  last_updated: "2024-03-27"
  author: "ML Research Team"
  description: "Configuration for Phase 2-3: IDA analysis and ML model training"
